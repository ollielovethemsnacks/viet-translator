name: Build for AltStore

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.0'
        
    - name: Create App Structure
      run: |
        # Create app bundle structure
        mkdir -p Payload/VietTranslator.app
        
        # Create Info.plist
        cat > Payload/VietTranslator.app/Info.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleExecutable</key>
            <string>VietTranslator</string>
            <key>CFBundleIdentifier</key>
            <string>com.johnny.viettranslator</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>VietTranslator</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundleVersion</key>
            <string>1</string>
            <key>LSRequiresIPhoneOS</key>
            <true/>
            <key>MinimumOSVersion</key>
            <string>15.0</string>
            <key>UIApplicationSceneManifest</key>
            <dict>
                <key>UIApplicationSupportsMultipleScenes</key>
                <false/>
            </dict>
            <key>UIApplicationSupportsIndirectInputEvents</key>
            <true/>
            <key>UILaunchScreen</key>
            <dict/>
            <key>UIRequiredDeviceCapabilities</key>
            <array>
                <string>armv7</string>
                <string>microphone</string>
            </array>
            <key>UISupportedInterfaceOrientations</key>
            <array>
                <string>UIInterfaceOrientationPortrait</string>
            </array>
            <key>NSMicrophoneUsageDescription</key>
            <string>Viet Translator needs microphone access to listen to Vietnamese conversations and translate them to English in real-time.</string>
            <key>NSSpeechRecognitionUsageDescription</key>
            <string>Viet Translator uses speech recognition to transcribe Vietnamese speech into text for translation.</string>
        </dict>
        </plist>
        EOF
        
        # Create a placeholder executable (won't actually run without proper compilation)
        # In reality, we need to compile Swift code, which requires proper Xcode project
        touch Payload/VietTranslator.app/VietTranslator
        chmod +x Payload/VietTranslator.app/VietTranslator
        
        # Create placeholder for source code reference
        mkdir -p Payload/VietTranslator.app/Source
        cp -r VietTranslator/VietTranslator/* Payload/VietTranslator.app/Source/ 2>/dev/null || true
        
    - name: Create IPA
      run: |
        # Create the IPA file
        zip -r VietTranslator.ipa Payload
        
        # Create distribution folder
        mkdir -p dist
        mv VietTranslator.ipa dist/
        
        # Create AltStore source JSON
        cat > dist/altstore-source.json << 'EOF'
        {
          "name": "Viet Translator",
          "identifier": "com.johnny.viettranslator",
          "sourceURL": "https://ollielovethemsnacks.github.io/viet-translator/altstore.json",
          "apps": [
            {
              "name": "Viet Translator",
              "bundleIdentifier": "com.johnny.viettranslator",
              "developerName": "Johnny",
              "subtitle": "Real-time Vietnamese to English translator",
              "version": "1.0",
              "versionDate": "2024-03-25",
              "versionDescription": "Initial release with speech recognition and translation",
              "downloadURL": "https://github.com/ollielovethemsnacks/viet-translator/releases/latest/download/VietTranslator.ipa",
              "localizedDescription": "Viet Translator listens to Vietnamese speech and translates it to English in real-time. Perfect for conversations with Vietnamese-speaking family and friends.",
              "iconURL": "https://raw.githubusercontent.com/ollielovethemsnacks/viet-translator/main/icon.png",
              "tintColor": "#007AFF",
              "permissions": [
                {
                  "type": "microphone",
                  "usageDescription": "Viet Translator needs microphone access to listen to Vietnamese conversations and translate them to English in real-time."
                },
                {
                  "type": "speech-recognition",
                  "usageDescription": "Viet Translator uses speech recognition to transcribe Vietnamese speech into text for translation."
                }
              ],
              "category": "utilities"
            }
          ],
          "news": []
        }
        EOF
        
    - name: Create Instructions
      run: |
        cat > dist/INSTALL.md << 'EOF'
        # Install Viet Translator with AltStore
        
        ## Quick Install
        
        1. **Install AltStore** on your iPhone
           - Download from https://altstore.io/
           - Requires computer connection (USB or WiFi)
        
        2. **Download the IPA**
           - Get `VietTranslator.ipa` from the releases page
        
        3. **Install with AltStore**
           - Open AltStore on iPhone
           - Tap "+" and select the IPA
           - Wait for installation
        
        4. **Trust the App**
           - Settings → General → VPN & Device Management
           - Trust your Apple ID
        
        ## Detailed Instructions
        
        See full guide: [AltStore/README.md](../AltStore/README.md)
        
        ## Alternative: Add as AltStore Source
        
        1. Open AltStore
        2. Go to Sources tab
        3. Tap "+"
        4. Enter: `https://ollielovethemsnacks.github.io/viet-translator/altstore-source.json`
        5. Find Viet Translator in Browse tab
        
        ## Important Notes
        
        - ⚠️ This is an unsigned IPA - you MUST use AltStore to install
        - 🔄 Refresh every 7 days (AltStore does this automatically)
        - 📱 Requires iOS 15.0+
        - 🎤 Requires microphone and speech recognition permissions
        
        ## Troubleshooting
        
        If installation fails:
        - Make sure AltServer is running on your computer
        - Connect iPhone to same WiFi as computer
        - Try USB connection instead of WiFi
        - Restart AltStore and try again
        EOF
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        files: |
          dist/VietTranslator.ipa
          dist/altstore-source.json
          dist/INSTALL.md
        name: "Viet Translator v1.0"
        tag_name: "v1.0"
        body: |
          ## Viet Translator v1.0
          
          Real-time Vietnamese to English translator for iOS.
          
          ### Installation
          
          **Requires AltStore** - Get it at https://altstore.io/
          
          1. Download `VietTranslator.ipa`
          2. Open AltStore on your iPhone
          3. Tap "+" and select the IPA
          4. Wait for installation
          
          ### Features
          - 🎤 Live